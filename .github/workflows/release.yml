name: release

# Builds the single self-contained `cyrus` binary for every platform and attaches
# them to a GitHub Release. Each runner builds NATIVELY for its own OS/arch (cross
# -compiling this stack needs the target's C toolchain — ring, etc. — so native
# runners are the reliable path). Per target, in order: build the pinned codex
# fork, fetch cloudflared, then build cyrus with both embedded.
#
# Trigger: push a tag like `v0.1.0`, or run manually (workflow_dispatch) to dry-run
# the build artifacts without publishing a release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      reuse_codex_from:
        description: "Reuse the embedded codex from this release tag instead of recompiling it (e.g. v0.1.0). Empty = build codex from source. codex hasn't changed -> reuse builds in minutes."
        required: false
        default: ""

permissions:
  contents: write   # create the release + upload assets

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            cf: cloudflared-linux-amd64
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            cf: cloudflared-linux-arm64
          # Intel mac dropped: macos-13 caps at Xcode 15.x, where codex's
          # webrtc-sys cxx bridge fails to compile. Apple Silicon covers
          # current Macs; revisit if an Intel build path appears.
          - os: macos-14
            target: aarch64-apple-darwin
            cf: cloudflared-darwin-arm64.tgz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cf: cloudflared-windows-amd64.exe
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      # Default toolchain for the cyrus build. The codex fork pins its own rustc
      # via codex-rs/rust-toolchain.toml, which rustup auto-installs when we build
      # inside that directory below.
      - uses: dtolnay/rust-toolchain@stable

      # codex's webrtc-sys (livekit) dep fails its C++ cxx-bridge compile under
      # the runner's default Xcode 15.4 libc++ (a std::ranges::contiguous_range
      # static_assert on rust::Slice). Newer libc++ relaxes it — select the
      # newest Xcode installed on the runner before the build.
      - name: Use newest Xcode (macOS)
        if: runner.os == 'macOS'
        run: |
          set -eux
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          test -n "$latest"
          sudo xcode-select -s "$latest/Contents/Developer"
          cc --version
          xcodebuild -version

      # Fast path: codex hasn't changed since a prior release, so reuse the
      # already-built copy embedded in that release's cyrus binary instead of
      # recompiling the (huge) codex workspace. Running the old binary once
      # self-extracts its codex to CYRUS_HOME/bin via cyrus's own extractor
      # (extract_once in embedded.rs) — that runs in codex_command() BEFORE codex
      # launches, so even if the launched `codex --version` hangs on the
      # onboarding gate, the binary is already on disk. We kill it after.
      - name: Reuse codex from a prior release (fast path)
        if: inputs.reuse_codex_from != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux
          tag="${{ inputs.reuse_codex_from }}"
          base="cyrus-${{ matrix.target }}"
          work="$RUNNER_TEMP/reuse"
          mkdir -p "$work" && cd "$work"
          if [ "${{ runner.os }}" = "Windows" ]; then
            gh release download "$tag" -R "$GITHUB_REPOSITORY" -p "$base.zip"
            7z x "$base.zip" >/dev/null
            BIN="./cyrus.exe"
          else
            gh release download "$tag" -R "$GITHUB_REPOSITORY" -p "$base.tar.gz"
            tar -xzf "$base.tar.gz"
            chmod +x ./cyrus
            BIN="./cyrus"
          fi
          export CYRUS_HOME="$work/.cyrus"
          # Launch in the background; extraction completes before codex starts, so
          # we just need it to run far enough, then reap it (no `timeout` dep — BSD
          # macOS doesn't ship one).
          "$BIN" --version >/dev/null 2>&1 &
          p=$!
          ( sleep 30; kill -9 "$p" ) >/dev/null 2>&1 &
          wait "$p" 2>/dev/null || true
          codex=$(ls "$CYRUS_HOME"/bin/codex-* 2>/dev/null | head -1)
          test -n "$codex" || { echo "codex was not extracted from $tag"; ls -la "$CYRUS_HOME"/bin 2>/dev/null || true; exit 1; }
          echo "CODEX_BIN=$codex" >> "$GITHUB_ENV"
          echo "reused codex from $tag: $codex"

      - name: Read pinned codex fork (scripts/codex.lock)
        id: codex
        if: inputs.reuse_codex_from == ''
        run: |
          # POSIX [[:space:]], not \s: BSD sed on the macOS runners doesn't grok
          # \s, so it left a leading space in the value (url=" https://...") and
          # broke `git clone`. tr strips any stray whitespace / CR (CRLF lock file).
          url=$(sed -nE 's/^[[:space:]]*url[[:space:]]*=[[:space:]]*//p' scripts/codex.lock | tr -d '[:space:]')
          sha=$(sed -nE 's/^[[:space:]]*sha[[:space:]]*=[[:space:]]*//p' scripts/codex.lock | tr -d '[:space:]')
          [ -n "$url" ] && [ -n "$sha" ] || { echo "codex.lock missing url/sha"; exit 1; }
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "codex fork: $url @ $sha"

      - name: Build pinned codex fork
        if: inputs.reuse_codex_from == ''
        # The codex workspace is huge; its release profile (thin LTO +
        # line-tables debug, default parallelism) peaks past the runner's RAM
        # and the agent gets SIGKILLed (exit 143). Cap concurrency and strip the
        # memory/disk-heavy bits — codex runs as a subprocess, so dropping LTO /
        # debuginfo costs nothing we care about and makes the embedded bin smaller.
        env:
          CARGO_BUILD_JOBS: "2"
          CARGO_PROFILE_RELEASE_LTO: "false"
          CARGO_PROFILE_RELEASE_DEBUG: "false"
          CARGO_PROFILE_RELEASE_STRIP: "true"
        run: |
          set -eux
          git clone --no-checkout "${{ steps.codex.outputs.url }}" "$RUNNER_TEMP/codex"
          git -C "$RUNNER_TEMP/codex" -c advice.detachedHead=false checkout "${{ steps.codex.outputs.sha }}"
          # Build from inside codex-rs so its rust-toolchain.toml is honored.
          ( cd "$RUNNER_TEMP/codex/codex-rs" && cargo build --release --bin codex )
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "CODEX_BIN=$RUNNER_TEMP/codex/codex-rs/target/release/codex.exe" >> "$GITHUB_ENV"
          else
            echo "CODEX_BIN=$RUNNER_TEMP/codex/codex-rs/target/release/codex" >> "$GITHUB_ENV"
          fi

      - name: Fetch cloudflared (embedded)
        run: |
          set -eux
          mkdir -p "$RUNNER_TEMP/cf"
          url="https://github.com/cloudflare/cloudflared/releases/latest/download/${{ matrix.cf }}"
          case "${{ matrix.cf }}" in
            *.tgz)  curl -fsSL "$url" -o "$RUNNER_TEMP/cf/cf.tgz"
                    tar -xzf "$RUNNER_TEMP/cf/cf.tgz" -C "$RUNNER_TEMP/cf"
                    echo "CF_BIN=$RUNNER_TEMP/cf/cloudflared" >> "$GITHUB_ENV" ;;
            *.exe)  curl -fsSL "$url" -o "$RUNNER_TEMP/cf/cloudflared.exe"
                    echo "CF_BIN=$RUNNER_TEMP/cf/cloudflared.exe" >> "$GITHUB_ENV" ;;
            *)      curl -fsSL "$url" -o "$RUNNER_TEMP/cf/cloudflared"
                    chmod +x "$RUNNER_TEMP/cf/cloudflared"
                    echo "CF_BIN=$RUNNER_TEMP/cf/cloudflared" >> "$GITHUB_ENV" ;;
          esac

      - name: Build cyrus (single binary, embedding codex + cloudflared)
        # No job cap here: the -j2 throttle exists only for codex's giant
        # workspace (OOM → exit 143). The cyrus workspace is small, so let it use
        # every core. LTO stays off / strip on for a fast, lean build.
        env:
          CARGO_PROFILE_RELEASE_LTO: "false"
          CARGO_PROFILE_RELEASE_DEBUG: "false"
          CARGO_PROFILE_RELEASE_STRIP: "true"
        run: |
          set -eux
          # CODEX_BIN is exported by exactly one of the two upstream steps:
          # "Build pinned codex fork" (from source) or "Reuse codex from a prior
          # release" (fast path). Either way it points at a real codex executable.
          test -f "$CODEX_BIN"
          CYRUS_EMBED_CODEX="$CODEX_BIN" \
          CYRUS_EMBED_CLOUDFLARED="$CF_BIN" \
          CYRUS_EMBED_ZSTD_LEVEL=19 \
            cargo build --release -p cyrus-setup --bin cyrus

      - name: Package
        id: pkg
        run: |
          set -eux
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/release/cyrus.exe dist/cyrus.exe
            asset="cyrus-${{ matrix.target }}.zip"
            ( cd dist && 7z a "$asset" cyrus.exe >/dev/null )
          else
            cp target/release/cyrus dist/cyrus
            asset="cyrus-${{ matrix.target }}.tar.gz"
            ( cd dist && tar -czf "$asset" cyrus )
          fi
          ( cd dist && shasum -a 256 "$asset" > "$asset.sha256" 2>/dev/null || sha256sum "$asset" > "$asset.sha256" )
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: cyrus-${{ matrix.target }}
          path: |
            dist/${{ steps.pkg.outputs.asset }}
            dist/${{ steps.pkg.outputs.asset }}.sha256
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4   # for the install scripts shipped as release assets
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Collect checksums
        run: |
          set -eux
          cd artifacts
          cat *.sha256 > SHA256SUMS
          ls -la
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # install.sh / install.ps1 ride the release so the one-liners resolve at
          # github.com/dannyisbad/cyrus/releases/latest/download/install.sh — no
          # separate site to host or wire up.
          files: |
            artifacts/cyrus-*.tar.gz
            artifacts/cyrus-*.zip
            artifacts/SHA256SUMS
            scripts/install.sh
            scripts/install.ps1
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish-npm:
    name: publish @mundy/cyrus
    needs: publish   # only after the release (with binaries) exists — the shim fetches them
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Set version from tag
        working-directory: npm
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: Publish
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
